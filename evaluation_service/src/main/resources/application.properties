spring.application.name=evaluation_service
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
evaluation.access-events.exchange=${EVALUATION_ACCESS_EVENTS_EXCHANGE:guardium.access-events}
evaluation.access-events.queue=${EVALUATION_ACCESS_EVENTS_QUEUE:guardium.access-events.evaluation-service}
evaluation.access-events.routing-key=${EVALUATION_ACCESS_EVENTS_ROUTING_KEY:access-event.created}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=${EVALUATION_ACCESS_EVENTS_RETRY_MAX_ATTEMPTS:5}
spring.rabbitmq.listener.simple.retry.initial-interval=${EVALUATION_ACCESS_EVENTS_RETRY_INITIAL_INTERVAL:1s}
spring.rabbitmq.listener.simple.retry.multiplier=${EVALUATION_ACCESS_EVENTS_RETRY_MULTIPLIER:2}
spring.rabbitmq.listener.simple.retry.max-interval=${EVALUATION_ACCESS_EVENTS_RETRY_MAX_INTERVAL:30s}
