spring.application.name=ingestion_processor
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
ingestion.events.exchange=${INGESTION_EVENTS_EXCHANGE:guardium.access-events}
ingestion.events.routing-key=${INGESTION_EVENTS_ROUTING_KEY:access-event.created}
ingestion.raw-events.exchange=${INGESTION_RAW_EVENTS_EXCHANGE:guardium.ingestion-events}
ingestion.raw-events.queue=${INGESTION_RAW_EVENTS_QUEUE:guardium.ingestion-events.ingestion-processor}
ingestion.raw-events.routing-key=${INGESTION_RAW_EVENTS_ROUTING_KEY:ingestion-event.created}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=${INGESTION_RAW_EVENTS_RETRY_MAX_ATTEMPTS:5}
spring.rabbitmq.listener.simple.retry.initial-interval=${INGESTION_RAW_EVENTS_RETRY_INITIAL_INTERVAL:1s}
spring.rabbitmq.listener.simple.retry.multiplier=${INGESTION_RAW_EVENTS_RETRY_MULTIPLIER:2}
spring.rabbitmq.listener.simple.retry.max-interval=${INGESTION_RAW_EVENTS_RETRY_MAX_INTERVAL:30s}
